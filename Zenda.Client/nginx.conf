server {
    listen 80;
    
    # 1. Pon el 'root' aquÿ arriba. 
    # (Aseg·rate de dejar la ruta exacta que ya tenÿas, ej: /usr/share/nginx/html)
    root /tu/ruta/al/wwwroot; 
    
    index index.html;

    # 2. El bloque del Service Worker corregido
    location ~* (service-worker\.js|service-worker-assets\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        try_files $uri =404; # Esto le dice a NGINX que busque y sirva el archivo
    }

    # 3. Tu bloque normal (sin el root adentro)
    location / {
        try_files $uri $uri/ /index.html;
    }
}