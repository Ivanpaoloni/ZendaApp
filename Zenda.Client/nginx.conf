server {
    listen 80;

    # 1. Bloque NUEVO: Intercepta la PWA para evitar la caché de Railway/Nginx
    location ~* ^/(service-worker\.js|service-worker-assets\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        try_files $uri =404;
    }

    # 2. Bloque ORIGINAL: Tu configuración intacta para el resto de Zendy
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html =404;
    }
}