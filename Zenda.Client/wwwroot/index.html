<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenda | Atelier Digital</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Zenda.Client.styles.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-background text-on-surface font-body selection:bg-secondary-container">
    <div id="app">
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="text-3xl font-headline font-extrabold text-primary animate-pulse tracking-tighter">Zenda</div>
            <div class="mt-4 w-12 h-0.5 bg-surface-container-high overflow-hidden">
                <div class="bg-primary h-full animate-[loading_1.5s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
        #blazor-error-ui {
            display: none; /* Escondido por defecto */
        }

        /* Blazor le pone esta clase cuando hay un error real */
        #blazor-error-ui.show {
            display: flex;
        }
    </style>


    <div id="blazor-error-ui" class="hidden fixed bottom-4 left-4 right-4 z-[100] p-4 bg-primary text-white rounded-2xl shadow-2xl flex items-center justify-between animate-in slide-in-from-bottom-10">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined">warning</span>
            <span class="font-body text-sm font-semibold">Ups! Algo salió mal.</span>
            <a href="." class="reload bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-xs font-bold transition-all">Recargar</a>
            <button class="dismiss text-white/50 hover:text-white">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#055043",
                        "on-primary": "#ffffff",
                        "background": "#f7faf6",
                        "surface-container-low": "#f1f5f1",
                        "surface-container-high": "#e5e9e5",
                        "on-surface": "#181d1b",
                        "on-surface-variant": "#3e4944",
                        "secondary-container": "#a4f0e9",
                        "on-secondary-container": "#1d706a",
                        "outline-variant": "#bec9c3"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "4xl": "2rem"
                    }
                }
            }
        }
    </script>
    <style>
        /* La sombra editorial que le da el toque premium */
        .editorial-shadow {
            box-shadow: 0px 24px 48px rgba(24, 29, 27, 0.06);
        }
    </style>
</body>
</html>
