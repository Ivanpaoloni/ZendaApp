<!DOCTYPE html>
<html lang="es-ar">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zendy | Reservas online</title>
    <base href="/" />
    <link id="favicon" rel="icon" type="image/png" href="favicon.png" />
    <link href="Zenda.Client.styles.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Enlace al Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Color de la barra de direcciones en Android -->
    <meta name="theme-color" content="#055043" />

    <!-- Soporte PWA para iOS/Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zendy" />
    <!-- Usa tu logo Z para el icono de iOS -->
    <link rel="apple-touch-icon" href="icon-192.png" />

</head>

<body class="bg-background text-on-surface font-body selection:bg-secondary-container overflow-x-hidden w-full m-0 p-0">
    <!-- Reemplaza el contenido dentro de <div id="app"> con esto -->
    <div id="app" class="flex flex-col min-h-[100dvh] w-full overflow-x-hidden relative">
        <div class="flex flex-col items-center justify-center min-h-screen bg-background">
            <div class="flex flex-col items-center gap-4 animate-pulse">

                <img src="img/zendy-logo.png"
                     alt="Zendy Logo"
                     width="80"
                     height="80"
                     class="logo-loading rounded-3xl editorial-shadow" />

                <div class="text-3xl font-headline font-extrabold text-primary tracking-tighter">
                    Zendy
                </div>
            </div>

            <div class="mt-6 w-16 h-1 bg-surface-container-high rounded-full overflow-hidden">
                <div class="bg-primary h-full animate-[loading_1.5s_infinite_ease-in-out]"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        #blazor-error-ui {
            display: none;
        }

            #blazor-error-ui.show {
                display: flex;
            }

        /* La sombra editorial que le da el toque premium */
        .editorial-shadow {
            box-shadow: 0px 24px 48px rgba(24, 29, 27, 0.06);
        }

        .logo-loading {
            width: 80px !important; /* Equivalente a w-20 */
            height: 80px !important; /* Equivalente a h-20 */
            object-fit: contain;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
    </style>

    <div id="blazor-error-ui" class="hidden fixed bottom-4 left-4 right-4 z-[100] p-4 bg-primary text-white rounded-2xl shadow-2xl flex items-center justify-between animate-in slide-in-from-bottom-10">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined">warning</span>
            <span class="font-body text-sm font-semibold">Ups! Algo salió mal.</span>
            <a href="." class="reload bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-xs font-bold transition-all">Recargar</a>
            <button class="dismiss text-white/50 hover:text-white">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
    </div>

    <div id="update-notification" class="hidden fixed bottom-6 right-6 bg-primary text-white p-5 rounded-[2rem] shadow-2xl z-[9999] flex-col md:flex-row items-center gap-4 animate-in slide-in-from-bottom-5">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-2xl">update</span>
            <div class="flex flex-col">
                <span class="font-bold font-headline">Nueva versión disponible</span>
                <span class="text-xs text-white/80">Zendy se actualizó con mejoras.</span>
            </div>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>

        // Registro del Service Worker para habilitar PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#055043",
                        "support": "#4F46E5",
                        "on-primary": "#ffffff",
                        "background": "#f7faf6",
                        "surface-container-low": "#f1f5f1",
                        "surface-container-high": "#e5e9e5",
                        "on-surface": "#181d1b",
                        "on-surface-variant": "#3e4944",
                        "secondary-container": "#a4f0e9",
                        "on-secondary-container": "#1d706a",
                        "outline-variant": "#bec9c3"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "4xl": "2rem"
                    }
                }
            }
        }
        window.cambiarFavicon = (url) => {
            let link = document.getElementById('favicon');
            if (!link) {
                link = document.createElement('link');
                link.id = 'favicon';
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = url ? url : 'favicon.png';
        };

        window.downloadFileFromStream = async (fileName, contentStreamReference) => {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }

        window.descargarImagenUrl = async (url, nombreArchivo) => {
            const response = await fetch(url);
            const blob = await response.blob();
            const urlBlob = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = urlBlob;
            a.download = nombreArchivo;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(urlBlob);
        };

    </script>
</body>
</html>
